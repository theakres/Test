name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Создаем пустой файл-заглушку, чтобы Gradle не ругался на его отсутствие
      - name: Create Fake Keystore File
        run: touch my-upload-key.jks

      - name: Setup and Run Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 9.3.1
          arguments: assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/
          
