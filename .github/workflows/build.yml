name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Обновил до JDK 21, так как Gradle 9.3+ требует современную Java
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Указываем версию Gradle 9.3.1, которую просит сам сборщик
      - name: Setup and Run Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 9.3.1
          arguments: assembleRelease

      # Загружаем готовый APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          
