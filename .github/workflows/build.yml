name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Генерируем Gradle более свежей версии (8.4), которая лучше дружит с JDK 17
      - name: Generate Fresh Gradle Wrapper
        run: |
          rm -rf gradle/wrapper
          gradle wrapper --gradle-version 8.4

      # Дополнительно очистим кэш Gradle перед сборкой на всякий случай
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Запускаем сборку с отключенным кэшем конфигурации (--no-configuration-cache)
      - name: Build APK (release)
        run: ./gradlew assembleRelease --no-configuration-cache

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          with:
          name: app-release
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          
